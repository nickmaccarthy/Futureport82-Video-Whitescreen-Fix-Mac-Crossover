name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install semantic-release plugins
        run: npm install -g semantic-release @semantic-release/commit-analyzer @semantic-release/release-notes-generator @semantic-release/changelog @semantic-release/exec @semantic-release/git @semantic-release/github

      - name: Run semantic-release
        id: semrel
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com
        run: |
          npx semantic-release 2>&1 | tee /tmp/sr-output.txt
          VERSION=$(sed -n 's/.*Published release \([0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*\).*/\1/p' /tmp/sr-output.txt | head -1)
          if [ -n "$VERSION" ]; then
            echo "new_release=true" >> $GITHUB_OUTPUT
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "Released version: $VERSION"
          else
            echo "new_release=false" >> $GITHUB_OUTPUT
            echo "No new release"
          fi

      - name: Build release binary
        if: steps.semrel.outputs.new_release == 'true'
        run: swift build -c release

      - name: Create app bundle
        if: steps.semrel.outputs.new_release == 'true'
        run: |
          APP_NAME="FP82Fixer"
          BUNDLE_DIR="build/${APP_NAME}.app"
          VERSION="${{ steps.semrel.outputs.version }}"

          mkdir -p "${BUNDLE_DIR}/Contents/MacOS"
          mkdir -p "${BUNDLE_DIR}/Contents/Resources"

          cp ".build/release/${APP_NAME}" "${BUNDLE_DIR}/Contents/MacOS/"
          RESOURCE_BUNDLE="$(find -L .build/release -maxdepth 1 -type d -name "${APP_NAME}_*.bundle" | head -n 1)"
          if [ -z "${RESOURCE_BUNDLE}" ]; then
            echo "SwiftPM resource bundle not found in .build/release"
            ls -la .build/release
            exit 1
          fi
          cp -R "${RESOURCE_BUNDLE}" "${BUNDLE_DIR}/Contents/Resources/"
          if [ ! -f "${BUNDLE_DIR}/Contents/Resources/$(basename "${RESOURCE_BUNDLE}")/FixResources/mf-fix-cx.sh" ]; then
            echo "Copied bundle is missing expected FixResources/mf-fix-cx.sh"
            find "${BUNDLE_DIR}/Contents/Resources" -maxdepth 4 -print
            exit 1
          fi

          cp Resources/Info.plist "${BUNDLE_DIR}/Contents/"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${VERSION}" "${BUNDLE_DIR}/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${VERSION}" "${BUNDLE_DIR}/Contents/Info.plist"

          cp Resources/AppIcon.icns "${BUNDLE_DIR}/Contents/Resources/" 2>/dev/null || true

      - name: Import signing certificate
        if: steps.semrel.outputs.new_release == 'true'
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"

          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode -o "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

          echo "Imported signing certificate subjects:"
          openssl pkcs12 -legacy -in "$CERT_PATH" -nokeys -passin "pass:$APPLE_CERTIFICATE_PASSWORD" 2>/dev/null \
            | openssl crl2pkcs7 -nocrl -certfile /dev/stdin 2>/dev/null \
            | openssl pkcs7 -print_certs -noout 2>/dev/null \
            | sed -n 's/^subject=//p'

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV

      - name: Sign app bundle
        if: steps.semrel.outputs.new_release == 'true'
        env:
          SIGNING_IDENTITY: ${{ secrets.SIGNING_IDENTITY }}
        run: |
          codesign --force --deep --options runtime \
            --entitlements Resources/FP82Fixer.entitlements \
            --sign "$SIGNING_IDENTITY" \
            --timestamp \
            build/FP82Fixer.app

      - name: Notarize app
        id: notarize
        if: steps.semrel.outputs.new_release == 'true'
        continue-on-error: true
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_SPECIFIC_PASSWORD: ${{ secrets.APP_SPECIFIC_PASSWORD }}
        run: |
          echo "Notarization preflight:"
          echo "- apple_id length: ${#APPLE_ID}"
          echo "- team_id: $APPLE_TEAM_ID"
          echo "- app_specific_password length: ${#APP_SPECIFIC_PASSWORD}"
          xcrun notarytool history \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APP_SPECIFIC_PASSWORD" \
            --output-format json | head -c 1200 || true
          echo

          cd build && zip -r FP82Fixer-notarize.zip FP82Fixer.app
          SUBMISSION_ID=$(xcrun notarytool submit FP82Fixer-notarize.zip \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APP_SPECIFIC_PASSWORD" | sed -n 's/^  id: //p' | head -1)
          if [ -z "$SUBMISSION_ID" ]; then
            echo "Failed to read notarization submission ID."
            exit 1
          fi
          echo "submission_id=$SUBMISSION_ID" >> "$GITHUB_OUTPUT"

          echo "Notarization submission ID: $SUBMISSION_ID"
          ATTEMPTS=0
          MAX_ATTEMPTS=720
          START_TS=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "Polling started at: $START_TS"
          while true; do
            STATUS=$(xcrun notarytool info "$SUBMISSION_ID" \
              --apple-id "$APPLE_ID" \
              --team-id "$APPLE_TEAM_ID" \
              --password "$APP_SPECIFIC_PASSWORD" | sed -n 's/^ *status: //p' | head -1)
            echo "$(date -u +"%Y-%m-%dT%H:%M:%SZ") Current status: ${STATUS:-unknown}"

            if [ "$STATUS" = "Accepted" ]; then
              break
            fi

            if [ "$STATUS" = "Invalid" ] || [ "$STATUS" = "Rejected" ]; then
              echo "Notarization failed. Retrieving log..."
              xcrun notarytool log "$SUBMISSION_ID" \
                --apple-id "$APPLE_ID" \
                --team-id "$APPLE_TEAM_ID" \
                --password "$APP_SPECIFIC_PASSWORD"
              exit 1
            fi

            ATTEMPTS=$((ATTEMPTS + 1))
            if [ "$ATTEMPTS" -ge "$MAX_ATTEMPTS" ]; then
              echo "Timed out waiting for notarization after 180 minutes."
              echo "Final notarization info:"
              xcrun notarytool info "$SUBMISSION_ID" \
                --apple-id "$APPLE_ID" \
                --team-id "$APPLE_TEAM_ID" \
                --password "$APP_SPECIFIC_PASSWORD" || true
              echo "Attempting to retrieve notarization log at timeout:"
              xcrun notarytool log "$SUBMISSION_ID" \
                --apple-id "$APPLE_ID" \
                --team-id "$APPLE_TEAM_ID" \
                --password "$APP_SPECIFIC_PASSWORD" || true
              exit 1
            fi
            sleep 15
          done

          xcrun stapler staple FP82Fixer.app
          rm -f FP82Fixer-notarize.zip

      - name: Notarization warning
        if: steps.semrel.outputs.new_release == 'true' && steps.notarize.outcome != 'success'
        run: |
          echo "::warning::Notarization did not complete in CI. Uploading signed app zip anyway."
          echo "::warning::Check the 'Notarize app' logs for submission ID and continue polling manually."

      - name: Upload notarization metadata
        if: always() && steps.semrel.outputs.new_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat > build/FP82Fixer-notary-metadata.json <<EOF
          {
            "tag": "v${{ steps.semrel.outputs.version }}",
            "version": "${{ steps.semrel.outputs.version }}",
            "submission_id": "${{ steps.notarize.outputs.submission_id }}",
            "notarize_outcome": "${{ steps.notarize.outcome }}",
            "run_id": "${{ github.run_id }}",
            "run_url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }
          EOF
          gh release upload "v${{ steps.semrel.outputs.version }}" build/FP82Fixer-notary-metadata.json --clobber

      - name: Clean up keychain
        if: always()
        run: |
          if [ -n "$KEYCHAIN_PATH" ] && [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH"
          fi

      - name: Upload zip to GitHub Release
        if: always() && steps.semrel.outputs.new_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd build && zip -r FP82Fixer.zip FP82Fixer.app
          gh release upload "v${{ steps.semrel.outputs.version }}" FP82Fixer.zip --clobber
